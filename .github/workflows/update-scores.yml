name: Update Scores

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/update-scores.yml
      - scripts/update-scores.js
      - app.js
  # Refresh every 3 hours so knockout fixtures/results stay current across stage transitions.
  schedule:
    - cron: '15 */3 * * *'
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

concurrency:
  group: update-scores
  cancel-in-progress: false

jobs:
  update-scores:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch and update scores
        run: node scripts/update-scores.js
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}

      - name: Commit and push if scores changed
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add scores.js *.html
          if git diff --cached --quiet; then
            echo "No score changes — nothing to commit."
          else
            git commit -m "chore: update scores [skip ci]"
            git push
          fi
