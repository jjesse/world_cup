name: Update Scores

on:
  # Run at 2 AM Eastern Daylight Time every day (06:00 UTC).
  # The World Cup runs June–July when the US observes EDT (UTC-4), so this is accurate
  # for the entire tournament. During EST (UTC-5, winter) this would fire at 1 AM ET.
  schedule:
    - cron: '0 6 * * *'
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  update-scores:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch and update scores
        run: node scripts/update-scores.js
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}

      - name: Commit and push if scores changed
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add scores.js *.html
          if git diff --cached --quiet; then
            echo "No score changes — nothing to commit."
          else
            git commit -m "chore: update scores [skip ci]"
            git push
          fi
